<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>

<body>
    <form action="./s20260624_08_calc_data.php" method="get" id="myForm">
        <p>
            <label for="num1">num1</label>
            <input type="text" name="num1" id="num1" value="200">
        </p>
        <p>
            <label for="num2">num2</label>
            <input type="text" name="num2" id="num2" value="100">
        </p>
        <p>
            <label for="opt">opt</label>
            <input type="text" name="opt" id="opt" value="+">
        </p>
        <p>
            <input type="submit" value="submit">
        </p>
    </form>


    <!-- jquery  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- <img src="./s20260625_01_calc_data.php" alt=""> -->
    <script>
        // jquery 寫code
        $(document).ready(function () {

            // 1.bind
            const myForm = $('#myForm');

            // 2.action
            console.log('2026-06-25');

            // 1. 按下submit
            // 2. data = form data
            // 3. ajax to php
            // 4. get res
            // 5. res show output

            // 1. 按下submit
            myForm.submit(function (e) {
                // form submit 擋住
                e.preventDefault();
                console.log('myForm submit ok');
                console.log('this', this);
                console.log('$(this)', $(this));
                // jquery get form data
                // 2. data = form data
                let data = $(this).serialize();
                console.log('data', data);


                // 3. ajax to php
                let url = './s20260625_01_calc_data.php';
                $.ajax({
                    type: "get",
                    url: url,
                    data: data,
                    dataType: "json",
                    success: function (res) {
                        console.log('res', res);
                        console.log('res typeof', typeof (res));


                    }
                });
                // 3. ajax to php end

            });


            // 4. get res
            // 5. res show output




        });
    </script>
</body>

</html>
