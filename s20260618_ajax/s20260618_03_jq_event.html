<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>

<body>

    <p>
        <input type="text" name="" id="myInput">
    </p>
    <p>
        <button type="button" id="myBtn">myBtn</button>
    </p>
    <span id="mySpan">
    </span>




    <!-- jquery  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        // jquery 寫code
        $(document).ready(function () {

            // 1.bind
            const myBtn = $('#myBtn');
            const myInput = $('#myInput');
            const mySpan = $('#mySpan');


            console.log('myBtn', myBtn);
            console.log('myInput', myInput);
            console.log('mySpan', mySpan);



            // 2.action

            let timer; // 用來記錄計時器的變數

            // 建議 多使用change
            myInput.on('input', function () {
                // 1. 每當有新打字，就立刻清除上一次的計時器
                clearTimeout(timer);

                // 2. 重新設定一個 1000 毫秒（1秒）後執行的計時器
                timer = setTimeout(function () {
                    console.log('input change ok');
                    // 1.get input value by change
                    let getInput = myInput.val();
                    console.log('getInput', getInput);
                    // 2.span show input value
                    mySpan.text(getInput);
                }, 1000);
            });


        });
    </script>
</body>

</html>
