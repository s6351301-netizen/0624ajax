<!-- ctrl + h 代 全部取代 一個一個取代 -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 80%;
            height: 20vh;
            /* background-color: #ccc; */
            margin: auto;
            text-align: center;

        }

        .output-container {
            background-color: lightpink;
            text-align: center;
            width: 80%;
            height: 40vh;
            margin: auto;
            border-radius: 20px;
        }

        .box {
            width: 33%;
            height: 50%;
            background-color: lightblue;
            padding-top: 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .bg-blue {
            background-color: lightblue;
        }

        .bg-pink {
            background-color: lightpink;
        }

        /* .box1 {
            display: none;
        } */
    </style>
</head>

<body>
    <div class="container">
        <div class="box fadeInBtn">
            fadeIn
        </div>
        <div class="box fadeOutBtn">
            fadeOut
        </div>
        <div class="box fadeToggleBtn">
            fadeToggle
        </div>
    </div>

    <div class="output-container">

    </div>



    <!-- jquery  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        // jquery 寫code
        $(document).ready(function () {

            // 1.bind
            const fadeInBtn = $('.fadeInBtn');
            const fadeOutBtn = $('.fadeOutBtn');
            const fadeToggleBtn = $('.fadeToggleBtn');
            const outputContainer = $('.output-container');

            // 2.action

            // fadeInBtn click
            fadeInBtn.click(function (e) {
                // e.preventDefault();
                outputContainer.fadeIn();
            });

            // fadeOutBtn click
            fadeOutBtn.click(function (e) {
                // e.preventDefault();
                outputContainer.fadeOut();
            });

            // fadeToggleBtn click
            fadeToggleBtn.click(function (e) {
                // e.preventDefault();
                outputContainer.fadeToggle();
            });


        });
    </script>
</body>

</html>
